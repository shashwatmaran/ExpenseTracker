apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker   # 🔁 CHANGE: unique app name (e.g., onlinequiz-app)

spec:
  replicas: 1   # 🔁 CHANGE: increase if you want scaling (e.g., 2 or 3)

  selector:
    matchLabels:
      app: app   # 🔁 CHANGE: must match labels below

  template:
    metadata:
      labels:
        app: app   # 🔁 CHANGE: same as selector

    spec:
      containers:
        - name: app-container   # 🔁 CHANGE: container name (optional)

          image: shashmaran/expense-tracker:latest   # 🔁 CHANGE: your Docker image
          imagePullPolicy: Always

          ports:
            - containerPort: 8080   # ⚠️ MUST match your Java app port

---
apiVersion: v1
kind: Service
metadata:
  name: expensetracker-service   # 🔁 CHANGE: unique service name

spec:
  type: NodePort   # 🔁 CHANGE: use ClusterIP if internal-only

  selector:
    app: app   # 🔁 MUST match Deployment label

  ports:
    - port: 8080        # 🔁 Service port (external access inside cluster)
      targetPort: 8080  # ⚠️ MUST match containerPort

      nodePort: 30082   # 🔁 CHANGE: unique (range 30000–32767)