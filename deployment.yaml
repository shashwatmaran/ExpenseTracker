  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: expense-tracker  

  spec:
    replicas: 1   

    selector:
      matchLabels:
        app: app   
        
    template:
      metadata:
        labels:
          app: app   

      spec:
        containers:
          - name: app-container   

            image: shashmaran/expense-tracker:latest   
            imagePullPolicy: Always

            ports:
              - containerPort: 8080   
  ---
  apiVersion: v1
  kind: Service
  metadata:
    name: expensetracker-service   
  spec:
    type: NodePort  

    selector:
      app: app   

    ports:
      - port: 8080        
        targetPort: 8080  

        nodePort: 30082   